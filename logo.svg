<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:1" />
    </linearGradient>
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer hexagon -->
  <polygon points="100,10 180,55 180,145 100,190 20,145 20,55" 
           fill="none" 
           stroke="url(#logoBorder)" 
           stroke-width="6" 
           filter="url(#logoGlow)"
           stroke-linejoin="round"/>
  
  <!-- Inner tech grid lines -->
  <line x1="100" y1="30" x2="100" y2="60" stroke="#00f5ff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="100" y1="140" x2="100" y2="170" stroke="#00f5ff" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Code brackets -->
  <text x="100" y="120" 
        font-family="'JetBrains Mono', 'Fira Code', monospace" 
        font-size="72" 
        font-weight="700" 
        fill="#ffffff" 
        text-anchor="middle"
        style="letter-spacing:-2px">
    &lt;/&gt;
  </text>
</svg>