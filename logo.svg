        stroke-linejoin="round"/>
  
  <!-- Right bracket -->
  <path d="M140 85 L160 100 L140 115" 
        fill="none" 
        stroke="#00f5ff" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
